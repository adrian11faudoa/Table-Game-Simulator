version: '3.8'
services:
  infinitytable-server:
    image: infinitytable/server:latest
    container_name: it_server
    restart: unless-stopped
    ports:
      - "7777:7777/udp"
      - "7778:7778/tcp"
    environment:
      - IT_MAX_PLAYERS=6
      - IT_SERVER_NAME=InfinityTable Server
      - IT_PORT=7777
      - IT_PASSWORD=
      - IT_MAP=TableMap
    volumes:
      - ./Saved:/app/Saved
      - ./Mods:/app/Mods
    healthcheck:
      test: ["CMD","nc","-zu","127.0.0.1","7777"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
