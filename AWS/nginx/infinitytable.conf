# InfinityTable Nginx Config
# Health check + status endpoints

server {
    listen 80;
    server_name _;

    # Health check for load balancers / uptime monitors
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"InfinityTable","port":7777}';
        add_header Content-Type application/json;
    }

    # Server status endpoint
    location /status {
        return 200 '{"server":"InfinityTable","game_port":7777,"query_port":7778}';
        add_header Content-Type application/json;
    }

    # Block all other HTTP traffic
    location / {
        return 404 'Not found';
    }
}
